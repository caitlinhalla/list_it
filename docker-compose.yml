services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: list_it
      POSTGRES_PASSWORD: list_it_dev
      POSTGRES_DB: list_it_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U list_it"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
